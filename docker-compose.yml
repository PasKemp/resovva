# Lokale Dev-Umgebung (siehe docs/01_TECHNICAL_ARCHITECTURE.md)
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: resovva
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resovva
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resovva -d resovva"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      target: dev
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://resovva:password@postgres:5432/resovva
      POSTGRES_CHECKPOINT_URL: postgresql://resovva:password@postgres:5432/resovva
      ALLOWED_ORIGINS: http://localhost:5173
      SECRET_KEY: local-dev-secret-key-change-in-production
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: resovva-docs
      # Stripe (Epic 5) – leer lassen für Dev-Modus (kein Stripe-Redirect)
      # STRIPE_SECRET_KEY: sk_test_...
      # STRIPE_WEBHOOK_SECRET: whsec_...
      # STRIPE_PRICE_ID: price_...
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      # Used by vite.config.ts (Node.js / server-side) to reach the backend
      # container via the internal Docker network when proxying /api/* requests.
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
